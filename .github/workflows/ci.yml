name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Syntax & dependency check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: seo_agent/requirements.txt

      - name: Install dependencies
        run: pip install -r seo_agent/requirements.txt gunicorn

      - name: Check all Python files parse cleanly
        run: |
          python - <<'EOF'
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk("seo_agent"):
              dirs[:] = [d for d in dirs if d not in ("__pycache__", ".venv", "venv")]
              for name in files:
                  if not name.endswith(".py"):
                      continue
                  path = os.path.join(root, name)
                  try:
                      ast.parse(open(path).read())
                  except SyntaxError as e:
                      errors.append(f"{path}: {e}")
          if errors:
              print("\n".join(errors))
              sys.exit(1)
          print(f"All Python files parsed OK")
          EOF

      - name: Verify installed packages are consistent
        run: pip check
